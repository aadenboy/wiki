name: Create page
description: Create a new page with wikitext.
title: "[Creation]: "
labels: ["new page", "wikitext"]
assignees:
  - aadenboy
body:
  - type: markdown
    attributes:
      value: |
        This is used to create a page with wikitext.
        If you aren't sure on how to use wikitext, visit https://www.mediawiki.org/wiki/Wikitext for instructions. You may want to use the "Suggest new page" template instead.
  - type: input
    id: page
    attributes:
      label: Page to create
      description: What will be the name of the page?
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Descrpition
      description: Give a description of what the page will be and why it should be added.
      placeholder: Lorem ipsum dolor sit amet
    validations:
      required: true
  - type: textarea
    id: wikitext
    attributes:
      label: Wikitext
      description: Put the wikitext for your page here.
      placeholder: Lorem ipsum dolor sit amet
    validations:
      required: true
  - type: markdown
    attributes:
      value: Note that anything you contribute to the Aadenboy Wiki is to be licensed under CC BY-SA 4.0.